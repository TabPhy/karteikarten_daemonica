<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory – Minispiel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<style>
  .game-board { display: grid; gap: 14px; max-width: 600px; margin: 0 auto; }
  @media (max-width: 500px) { .game-board { gap: 8px; } }

  .mem-card { aspect-ratio: 3/4; perspective: 800px; cursor: pointer; }
  .mem-card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(.4,0,.2,1);
  }
  .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
  .mem-card.matched .mem-card-inner { animation: celebrate 0.6s ease; }
  .mem-card.matched .mem-back { border-color: rgba(207,157,123,0.5); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(207,157,123,0.15); }
  .mem-card.wrong .mem-card-inner { animation: shake 0.5s ease; }

  .mem-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 14px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; overflow: hidden;
  }
  .mem-front {
    background: linear-gradient(150deg, var(--jungle), var(--jet));
    border: 1px solid rgba(207,157,123,0.1);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .mem-front::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(207,157,123,0.06), transparent 60%);
  }
  .mem-card:hover .mem-front {
    border-color: rgba(207,157,123,0.3);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 20px rgba(207,157,123,0.05);
  }
  .mem-front-icon { font-size: 28px; opacity: 0.2; margin-bottom: 6px; }
  .mem-front-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--brass); opacity: 0.2; }

  .mem-back {
    transform: rotateY(180deg);
    background: linear-gradient(150deg, rgba(58,53,52,0.9), rgba(22,33,39,0.95));
    border: 1px solid rgba(207,157,123,0.2);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(207,157,123,0.06);
    padding: 12px;
  }
  .mem-emoji { font-size: 42px; margin-bottom: 6px; }
  .mem-label { font-size: 11px; color: var(--brass); opacity: 0.7; text-align: center; font-weight: 500; }

  .stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 32px; animation: slideUp 0.5s 0.2s both ease; }
  .stat-item { text-align: center; }
  .stat-value {
    font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700;
    background: linear-gradient(135deg, var(--brass-light), var(--brass));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--brass); opacity: 0.35; margin-top: 4px; }

  .diff-btn {
    background: rgba(207,157,123,0.06); color: var(--brass);
    border: 1px solid rgba(207,157,123,0.12); border-radius: 10px;
    padding: 8px 20px; font-size: 13px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.3s;
  }
  .diff-btn:hover { background: rgba(207,157,123,0.12); border-color: rgba(207,157,123,0.25); }
  .diff-btn.active { background: rgba(207,157,123,0.15); border-color: rgba(207,157,123,0.35); color: var(--brass-light); }

  .win-overlay {
    position: fixed; inset: 0; background: rgba(12,21,25,0.88);
    display: flex; justify-content: center; align-items: center; z-index: 80;
    animation: fadeIn 0.5s ease; backdrop-filter: blur(12px);
  }
  .win-card {
    background: linear-gradient(150deg, var(--jungle), var(--jet));
    border: 1px solid rgba(207,157,123,0.2); border-radius: 28px;
    padding: 48px 40px; text-align: center; max-width: 380px;
    animation: fadeScale 0.5s 0.2s both ease;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 60px rgba(207,157,123,0.08);
  }
  .confetti { position: fixed; pointer-events: none; z-index: 90; }
</style>
</head>
<body>
<script src="shared.js"></script>
<script>initSharedUI('spiel');</script>
<div class="page-wrap" id="app"></div>

<script>
const SYMBOLS = [
  {emoji:"📖",label:"Buch"},{emoji:"🪶",label:"Feder"},{emoji:"🕯️",label:"Kerze"},
  {emoji:"🗝️",label:"Schlüssel"},{emoji:"🌙",label:"Mond"},{emoji:"⭐",label:"Stern"},
  {emoji:"🦉",label:"Eule"},{emoji:"🌹",label:"Rose"},{emoji:"🏰",label:"Schloss"},
  {emoji:"⚔️",label:"Schwert"},{emoji:"🧭",label:"Kompass"},{emoji:"💎",label:"Juwel"},
  {emoji:"🔮",label:"Kristall"},{emoji:"📜",label:"Schriftrolle"},{emoji:"🎭",label:"Masken"},
  {emoji:"🏺",label:"Amphore"},{emoji:"👑",label:"Krone"},{emoji:"🗡️",label:"Dolch"},
];

let S = { difficulty:8, cards:[], flipped:[], matched:[], moves:0, time:0, timer:null, won:false, locked:false };

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function startGame(pairs) {
  clearInterval(S.timer);
  const picked = shuffle(SYMBOLS).slice(0, pairs);
  const deck = shuffle([...picked,...picked].map((s,i)=>({...s,id:i})));
  const cols = pairs <= 6 ? 3 : pairs <= 8 ? 4 : 5;
  S = { difficulty:pairs, cards:deck, flipped:[], matched:[], moves:0, time:0, timer:null, won:false, locked:false };
  S.timer = setInterval(()=>{ S.time++; renderStats(); },1000);
  render(cols);
}

function flipCard(index) {
  if(S.locked||S.flipped.includes(index)||S.matched.includes(index)) return;
  S.flipped.push(index);
  const el = document.querySelector(`[data-idx="${index}"]`);
  if(el) el.classList.add('flipped');

  if(S.flipped.length===2){
    S.moves++; renderStats();
    const [a,b]=S.flipped;
    if(S.cards[a].emoji===S.cards[b].emoji){
      S.matched.push(a,b); S.flipped=[];
      setTimeout(()=>{
        document.querySelector(`[data-idx="${a}"]`)?.classList.add('matched');
        document.querySelector(`[data-idx="${b}"]`)?.classList.add('matched');
      },200);
      if(S.matched.length===S.cards.length){ clearInterval(S.timer); S.won=true; setTimeout(showWin,700); }
    } else {
      S.locked=true;
      // ── Show wrong cards for 1.8s so player can memorize ──
      setTimeout(()=>{
        document.querySelector(`[data-idx="${a}"]`)?.classList.add('wrong');
        document.querySelector(`[data-idx="${b}"]`)?.classList.add('wrong');
      },400);
      setTimeout(()=>{
        document.querySelector(`[data-idx="${a}"]`)?.classList.remove('flipped','wrong');
        document.querySelector(`[data-idx="${b}"]`)?.classList.remove('flipped','wrong');
        S.flipped=[]; S.locked=false;
      },1800);
    }
  }
}

function fmt(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function renderStats(){
  const m=document.getElementById('moves'),t=document.getElementById('time'),p=document.getElementById('pairs');
  if(m)m.textContent=S.moves; if(t)t.textContent=fmt(S.time); if(p)p.textContent=`${S.matched.length/2}/${S.difficulty}`;
}

function spawnConfetti(){
  const colors=['#CF9D7B','#e0b99a','#724B39','#f0dcc8','#a17a5a'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'2px'};background:${colors[Math.floor(Math.random()*colors.length)]};opacity:${0.5+Math.random()*0.5};`;
    document.body.appendChild(c);
    const x=(Math.random()-0.5)*300, dur=1500+Math.random()*2000;
    c.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:`translate(${x}px,${innerHeight+40}px) rotate(${360+Math.random()*360}deg)`,opacity:0}],{duration:dur,delay:Math.random()*500,easing:'cubic-bezier(.2,.8,.3,1)'});
    setTimeout(()=>c.remove(),dur+600);
  }
}

function showWin(){
  spawnConfetti();
  const o=document.createElement('div');o.className='win-overlay';
  const rating = S.moves<=S.difficulty+2?'✨ Herausragend!':S.moves<=S.difficulty*2?'🌟 Sehr gut!':'👏 Gut gemacht!';
  o.innerHTML=`<div class="win-card"><div style="font-size:56px;margin-bottom:16px">🎉</div><h2 class="serif" style="font-size:28px;color:var(--brass-light);margin-bottom:8px">Geschafft!</h2><div class="divider" style="margin:12px auto 20px"></div><p style="color:var(--brass);opacity:0.6;font-size:14px;line-height:1.7;margin-bottom:24px">${S.moves} Züge in ${fmt(S.time)}<br><span style="font-size:12px;opacity:0.6">${rating}</span></p><button class="btn btn-primary" id="replay-btn" style="font-size:15px;padding:14px 32px">Nochmal spielen</button></div>`;
  document.body.appendChild(o);
  document.getElementById('replay-btn').onclick=()=>{o.remove();startGame(S.difficulty);};
  o.onclick=e=>{if(e.target===o){o.remove();startGame(S.difficulty);}};
}

function render(cols){
  const app=document.getElementById('app');
  const diffs=[{p:6,l:"Leicht",s:"6 Paare"},{p:8,l:"Mittel",s:"8 Paare"},{p:10,l:"Schwer",s:"10 Paare"}];
  app.innerHTML=`
    <header style="text-align:center;margin-bottom:40px">
      <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal 0.8s ease both">🃏  Minispiel</div>
      <h1 class="serif" style="font-size:44px;font-weight:800;color:var(--brass-light);line-height:1.1;animation:slideUp 0.6s ease both">Memory</h1>
      <div class="divider" style="margin:18px auto 0"></div>
      <p style="color:var(--brass);opacity:0.35;margin-top:12px;font-size:13px;font-style:italic;animation:fadeIn 1s .3s both">Finde alle Paare — so wenig Züge wie möglich</p>
    </header>
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:28px;animation:slideUp .5s .1s both ease">
      ${diffs.map(d=>`<button class="diff-btn ${d.p===S.difficulty?'active':''}" onclick="startGame(${d.p})">${d.l}<br><span style="font-size:10px;opacity:0.5">${d.s}</span></button>`).join('')}
    </div>
    <div class="stats">
      <div class="stat-item"><div class="stat-value" id="moves">0</div><div class="stat-label">Züge</div></div>
      <div class="stat-item"><div class="stat-value" id="time">0:00</div><div class="stat-label">Zeit</div></div>
      <div class="stat-item"><div class="stat-value" id="pairs">0/${S.difficulty}</div><div class="stat-label">Paare</div></div>
    </div>
    <div class="game-board" style="grid-template-columns:repeat(${cols},1fr)">
      ${S.cards.map((c,i)=>`
        <div class="mem-card" data-idx="${i}" onclick="flipCard(${i})" style="animation:popIn .4s ${i*.03}s both ease">
          <div class="mem-card-inner">
            <div class="mem-face mem-front"><div class="mem-front-icon">✦</div><div class="mem-front-label">Memory</div></div>
            <div class="mem-face mem-back"><div class="mem-emoji">${c.emoji}</div><div class="mem-label">${c.label}</div></div>
          </div>
        </div>`).join('')}
    </div>`;
}
startGame(8);
</script>
</body>
</html>
