<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buch-Karteikarten</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  :root {
    --black: #0C1519; --jungle: #162127; --jet: #3A3534;
    --coffee: #724B39; --brass: #CF9D7B; --brass-light: #e0b99a;
    --cream: #f0dcc8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--black); color: var(--cream); min-height: 100vh; overflow-x: hidden; }
  h1, h2, h3, .serif { font-family: 'Playfair Display', Georgia, serif; }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.35; }
    90% { opacity: 0; }
    100% { transform: translateY(-100vh) rotate(180deg); opacity: 0; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeScale { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes breathe {
    0%, 100% { opacity: 0.03; transform: scale(1); }
    50% { opacity: 0.07; transform: scale(1.05); }
  }
  @keyframes borderGlow {
    0%, 100% { border-color: rgba(207,157,123,0.1); }
    50% { border-color: rgba(207,157,123,0.25); }
  }
  @keyframes titleReveal {
    from { opacity: 0; transform: translateY(20px); letter-spacing: 12px; }
    to { opacity: 1; transform: translateY(0); letter-spacing: 6px; }
  }

  .particle {
    position: fixed; border-radius: 50%; pointer-events: none;
    background: radial-gradient(circle, var(--brass) 0%, transparent 70%);
  }

  .cat-card {
    transition: all 0.5s cubic-bezier(.4,0,.2,1); cursor: pointer;
    position: relative; overflow: hidden;
  }
  .cat-card::before {
    content: ''; position: absolute; inset: 0; opacity: 0;
    background: linear-gradient(135deg, rgba(207,157,123,0.12), transparent 60%);
    transition: opacity 0.5s;
  }
  .cat-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--brass), transparent);
    opacity: 0; transition: opacity 0.5s;
  }
  .cat-card:hover::before { opacity: 1; }
  .cat-card:hover::after { opacity: 0.5; }
  .cat-card:hover { transform: translateY(-8px); box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 40px rgba(207,157,123,0.06); }

  .flip-card { perspective: 1400px; cursor: pointer; }
  .flip-inner { transition: transform 0.8s cubic-bezier(.4,0,.2,1); transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 36px; overflow: hidden; }
  .flip-back { transform: rotateY(180deg); }

  .mini-card {
    transition: all 0.4s cubic-bezier(.4,0,.2,1); cursor: pointer;
    position: relative; overflow: hidden;
  }
  .mini-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(145deg, rgba(207,157,123,0.06), transparent);
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  .mini-card:hover::after { opacity: 1; }
  .mini-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.4); border-color: rgba(207,157,123,0.25) !important; }

  .btn {
    border: none; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
  }
  .btn:hover { transform: scale(1.04); }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: rgba(207,157,123,0.08); color: var(--brass);
    border-radius: 12px; padding: 8px 18px; font-size: 14px;
    border: 1px solid rgba(207,157,123,0.12);
  }
  .btn-ghost:hover { background: rgba(207,157,123,0.14); border-color: rgba(207,157,123,0.3); }

  .divider {
    width: 50px; height: 2px; border-radius: 1px;
    background: linear-gradient(90deg, var(--coffee), var(--brass));
  }

  .img-thumb {
    width: 60px; height: 60px; object-fit: cover; border-radius: 10px;
    border: 1px solid rgba(207,157,123,0.15); transition: all 0.4s; cursor: pointer;
    opacity: 0.8;
  }
  .img-thumb:hover { border-color: var(--brass); transform: scale(1.1); opacity: 1; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

  .card-bg-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0.1; filter: blur(1px) saturate(0.6);
    transition: opacity 0.6s;
  }

  .gallery-img {
    height: 180px; border-radius: 14px; object-fit: cover; cursor: pointer;
    border: 1px solid rgba(207,157,123,0.12); transition: all 0.4s;
    opacity: 0.85;
  }
  .gallery-img:hover { opacity: 1; transform: scale(1.03); box-shadow: 0 12px 36px rgba(0,0,0,0.5); border-color: rgba(207,157,123,0.3); }

  .overlay {
    position: fixed; inset: 0; background: rgba(12,21,25,0.85);
    display: flex; justify-content: center; align-items: center;
    z-index: 100; animation: fadeIn 0.3s ease; backdrop-filter: blur(16px);
    cursor: zoom-out;
  }

  .loading-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; animation: fadeIn 0.5s ease;
  }

  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%;
    transition: all 0.3s; cursor: pointer;
  }
  .nav-dot:hover { transform: scale(1.3); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(207,157,123,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(207,157,123,0.3); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const Particles = () => (
  <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }}>
    {Array.from({ length: 18 }, (_, i) => (
      <div key={i} className="particle" style={{
        left: `${3 + Math.random() * 94}%`, bottom: "-20px",
        width: `${2 + Math.random() * 5}px`, height: `${2 + Math.random() * 5}px`,
        animation: `floatUp ${12 + Math.random() * 10}s ${i * 0.9}s infinite ease-in-out`,
      }} />
    ))}
  </div>
);

const BgGlow = () => (
  <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0 }}>
    <div style={{ position: "absolute", top: "-30%", right: "-15%", width: "65vw", height: "65vw", borderRadius: "50%", background: "radial-gradient(circle, rgba(114,75,57,0.07) 0%, transparent 70%)", animation: "breathe 9s infinite ease-in-out" }} />
    <div style={{ position: "absolute", bottom: "-25%", left: "-10%", width: "55vw", height: "55vw", borderRadius: "50%", background: "radial-gradient(circle, rgba(207,157,123,0.04) 0%, transparent 70%)", animation: "breathe 12s 3s infinite ease-in-out" }} />
  </div>
);

function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [activeCat, setActiveCat] = useState(null);
  const [activeCard, setActiveCard] = useState(null);
  const [flipped, setFlipped] = useState(false);
  const [trans, setTrans] = useState(false);
  const [cardIdx, setCardIdx] = useState(0);
  const [lightbox, setLightbox] = useState(null);
  const [viewMode, setViewMode] = useState("grid");

  useEffect(() => {
    fetch("cards.json")
      .then(r => { if (!r.ok) throw new Error("cards.json nicht gefunden"); return r.json(); })
      .then(setData)
      .catch(e => setError(e.message));
  }, []);

  const transition = (fn) => { setTrans(true); setTimeout(() => { fn(); setTrans(false); }, 350); };
  const selectCat = (cat) => transition(() => { setActiveCat(cat); setActiveCard(null); setFlipped(false); setCardIdx(0); });
  const goHome = () => transition(() => { setActiveCat(null); setActiveCard(null); setFlipped(false); });
  const openCard = (card, idx) => { setActiveCard(card); setCardIdx(idx); setFlipped(false); };

  const navCard = (dir) => {
    const list = data[activeCat].karten;
    const next = (cardIdx + dir + list.length) % list.length;
    setFlipped(false);
    setTimeout(() => { setCardIdx(next); setActiveCard(list[next]); }, 200);
  };

  if (error) return (
    <div className="loading-screen">
      <div style={{ fontSize: 48, marginBottom: 20 }}>📚</div>
      <p className="serif" style={{ fontSize: 22, color: "var(--brass-light)", marginBottom: 10 }}>Fehler beim Laden</p>
      <p style={{ color: "var(--brass)", opacity: 0.5, fontSize: 14, maxWidth: 400, textAlign: "center", lineHeight: 1.6 }}>
        Die Datei <code style={{ background: "rgba(207,157,123,0.1)", padding: "2px 8px", borderRadius: 6 }}>cards.json</code> wurde nicht gefunden. Stelle sicher, dass sie im gleichen Ordner wie die index.html liegt.
      </p>
    </div>
  );

  if (!data) return (
    <div className="loading-screen">
      <BgGlow />
      <div style={{ fontSize: 48, marginBottom: 20, animation: "breathe 2s infinite" }}>📚</div>
      <p className="serif" style={{ fontSize: 20, color: "var(--brass-light)" }}>Lade Karteikarten...</p>
    </div>
  );

  const categories = Object.entries(data);
  const catData = activeCat ? data[activeCat] : null;
  const karten = catData ? catData.karten : [];

  return (
    <div style={{ minHeight: "100vh", position: "relative" }}>
      <Particles /><BgGlow />

      <div style={{
        maxWidth: 1020, margin: "0 auto", padding: "44px 24px", position: "relative", zIndex: 1,
        opacity: trans ? 0 : 1, transform: trans ? "translateY(12px)" : "translateY(0)",
        transition: "all 0.4s cubic-bezier(.4,0,.2,1)",
      }}>

        {/* HEADER */}
        <header style={{ textAlign: "center", marginBottom: 52, position: "relative" }}>
          {activeCat && (
            <button className="btn btn-ghost" onClick={goHome} style={{ position: "absolute", left: 0, top: 4 }}>← Zurück</button>
          )}
          <div style={{ fontSize: 11, letterSpacing: 6, textTransform: "uppercase", color: "var(--brass)", opacity: 0.5, marginBottom: 12, animation: "titleReveal 0.8s ease both" }}>
            {activeCat ? catData.icon + "  " + activeCat : "📚  Bibliothek"}
          </div>
          <h1 className="serif" style={{ fontSize: activeCat ? 38 : 52, fontWeight: 800, color: "var(--brass-light)", lineHeight: 1.1, animation: "slideUp 0.6s ease both" }}>
            {activeCat || "Karteikarten"}
          </h1>
          <div className="divider" style={{ margin: "18px auto 0" }} />
          {!activeCat && <p style={{ color: "var(--brass)", opacity: 0.4, marginTop: 14, fontSize: 14, fontWeight: 300, letterSpacing: 0.5, animation: "fadeIn 1s 0.3s both" }}>Wähle eine Kategorie, um deine Schlüsselkonzepte zu erkunden</p>}
          {activeCat && <p style={{ color: "var(--brass)", opacity: 0.35, marginTop: 10, fontSize: 13, fontStyle: "italic" }}>{catData.beschreibung}</p>}
        </header>

        {/* CATEGORIES */}
        {!activeCat && (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: 20 }}>
            {categories.map(([cat, meta], i) => {
              const count = meta.karten.length;
              return (
                <div key={cat} className="cat-card" onClick={() => selectCat(cat)} style={{
                  background: "linear-gradient(150deg, var(--jungle) 0%, var(--jet) 100%)",
                  borderRadius: 20, padding: "38px 30px",
                  border: "1px solid rgba(207,157,123,0.08)",
                  animation: `slideUp 0.6s ${i * 0.09}s both cubic-bezier(.4,0,.2,1)`,
                }}>
                  <div style={{ fontSize: 40, marginBottom: 18, filter: "grayscale(15%)" }}>{meta.icon}</div>
                  <h2 className="serif" style={{ fontSize: 26, fontWeight: 700, color: "var(--brass-light)", marginBottom: 6 }}>{cat}</h2>
                  <p style={{ fontSize: 13, color: "var(--brass)", opacity: 0.4, marginBottom: 16, fontStyle: "italic" }}>{meta.beschreibung}</p>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 36, height: 2, background: "linear-gradient(90deg, var(--coffee), var(--brass))", borderRadius: 1 }} />
                    <span style={{ fontSize: 12, color: "var(--brass)", opacity: 0.45, fontWeight: 500 }}>{count} {count === 1 ? "Karte" : "Karten"}</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* CARD LIST */}
        {activeCat && !activeCard && (
          <div style={{ animation: "fadeScale 0.5s ease" }}>
            {karten.length > 0 && (
              <div style={{ display: "flex", justifyContent: "flex-start", gap: 6, marginBottom: 24 }}>
                {["grid", "list"].map(m => (
                  <button key={m} className="btn" onClick={() => setViewMode(m)} style={{
                    background: viewMode === m ? "rgba(207,157,123,0.12)" : "transparent",
                    color: "var(--brass)", borderRadius: 8, padding: "6px 14px", fontSize: 14,
                    border: `1px solid ${viewMode === m ? "rgba(207,157,123,0.25)" : "transparent"}`,
                    opacity: viewMode === m ? 1 : 0.5,
                  }}>{m === "grid" ? "▦" : "☰"}</button>
                ))}
              </div>
            )}

            {karten.length === 0 && (
              <div style={{ textAlign: "center", padding: "80px 20px", animation: "fadeIn 0.8s ease" }}>
                <div style={{ fontSize: 60, marginBottom: 20, opacity: 0.5 }}>{catData.icon}</div>
                <p className="serif" style={{ fontSize: 22, color: "var(--brass-light)", opacity: 0.5 }}>Noch keine Karten</p>
                <p style={{ fontSize: 13, color: "var(--brass)", opacity: 0.3, marginTop: 10, lineHeight: 1.6 }}>
                  Füge Karten in der <code style={{ background: "rgba(207,157,123,0.1)", padding: "2px 8px", borderRadius: 6 }}>cards.json</code> hinzu
                </p>
              </div>
            )}

            <div style={{
              display: "grid",
              gridTemplateColumns: viewMode === "grid" ? "repeat(auto-fill, minmax(260px, 1fr))" : "1fr",
              gap: viewMode === "grid" ? 18 : 12,
            }}>
              {karten.map((card, i) => (
                <div key={i} className="mini-card" onClick={() => openCard(card, i)} style={{
                  background: "linear-gradient(150deg, rgba(22,33,39,0.9), rgba(58,53,52,0.45))",
                  borderRadius: 16, padding: viewMode === "grid" ? "26px 24px" : "18px 24px",
                  border: "1px solid rgba(207,157,123,0.07)",
                  animation: `${viewMode === "grid" ? "slideUp" : "slideRight"} 0.5s ${i * 0.07}s both ease`,
                  display: viewMode === "list" ? "flex" : "block",
                  alignItems: "center", gap: 18,
                }}>
                  {card.bilder?.length > 0 && <img src={card.bilder[0]} className="card-bg-img" alt="" loading="lazy" />}
                  <div style={{ position: "relative", zIndex: 1, flex: 1 }}>
                    <div style={{ fontSize: 10, color: "var(--brass)", opacity: 0.25, marginBottom: 5, fontWeight: 600, letterSpacing: 3 }}>{String(i + 1).padStart(2, "0")}</div>
                    <div className="serif" style={{ fontSize: 18, fontWeight: 700, color: "var(--brass-light)", marginBottom: 6 }}>{card.titel}</div>
                    <div style={{ fontSize: 13, color: "var(--brass)", opacity: 0.45, lineHeight: 1.6 }}>{card.vorderseite}</div>
                  </div>
                  {card.bilder?.length > 0 && (
                    <div style={{ display: "flex", gap: 5, marginTop: viewMode === "grid" ? 14 : 0, position: "relative", zIndex: 1, flexShrink: 0 }}>
                      {card.bilder.slice(0, 3).map((img, j) => (
                        <img key={j} src={img} loading="lazy" alt="" style={{ width: 34, height: 34, objectFit: "cover", borderRadius: 8, opacity: 0.55, border: "1px solid rgba(207,157,123,0.1)" }} />
                      ))}
                      {card.bilder.length > 3 && <span style={{ fontSize: 11, color: "var(--brass)", opacity: 0.3, alignSelf: "center", marginLeft: 3 }}>+{card.bilder.length - 3}</span>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ACTIVE CARD */}
        {activeCat && activeCard && (
          <div style={{ animation: "fadeScale 0.5s cubic-bezier(.4,0,.2,1)" }}>
            <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 28 }}>
              <button className="btn btn-ghost" onClick={() => setActiveCard(null)}>← Alle Karten</button>
            </div>

            <div className="flip-card" onClick={() => setFlipped(!flipped)} style={{ width: "100%", maxWidth: 540, height: 380, margin: "0 auto" }}>
              <div className={`flip-inner ${flipped ? "flipped" : ""}`}>
                {/* FRONT */}
                <div className="flip-face" style={{
                  background: "linear-gradient(150deg, var(--jet), var(--jungle))",
                  border: "1px solid rgba(207,157,123,0.12)",
                  boxShadow: "0 28px 70px rgba(0,0,0,0.45), 0 0 50px rgba(207,157,123,0.04)",
                }}>
                  {activeCard.bilder?.length > 0 && <img src={activeCard.bilder[0]} className="card-bg-img" alt="" style={{ opacity: 0.08 }} />}
                  <div style={{ position: "relative", zIndex: 1, textAlign: "center" }}>
                    <div style={{ fontSize: 10, letterSpacing: 5, color: "var(--brass)", opacity: 0.35, marginBottom: 16, textTransform: "uppercase" }}>Vorderseite</div>
                    <h2 className="serif" style={{ fontSize: 28, color: "var(--brass-light)", marginBottom: 12 }}>{activeCard.titel}</h2>
                    <div className="divider" style={{ margin: "0 auto 16px" }} />
                    <p style={{ fontSize: 16, color: "var(--cream)", opacity: 0.8, lineHeight: 1.7 }}>{activeCard.vorderseite}</p>
                    <div style={{ fontSize: 11, color: "var(--brass)", opacity: 0.2, marginTop: 28, fontStyle: "italic" }}>Klicke zum Umdrehen</div>
                  </div>
                </div>
                {/* BACK */}
                <div className="flip-face flip-back" style={{
                  background: "linear-gradient(150deg, var(--black), var(--jungle))",
                  border: "1px solid rgba(207,157,123,0.2)",
                  boxShadow: "0 28px 70px rgba(0,0,0,0.5), 0 0 60px rgba(207,157,123,0.06)",
                }}>
                  <div style={{ position: "relative", zIndex: 1, textAlign: "center" }}>
                    <div style={{ fontSize: 10, letterSpacing: 5, color: "var(--brass)", opacity: 0.35, marginBottom: 18, textTransform: "uppercase" }}>Rückseite</div>
                    <p style={{ fontSize: 16, color: "var(--cream)", lineHeight: 1.8, opacity: 0.85 }}>{activeCard.rueckseite || "—"}</p>
                  </div>
                </div>
              </div>
            </div>

            {/* IMAGE GALLERY */}
            {activeCard.bilder?.length > 0 && (
              <div style={{ marginTop: 32, animation: "slideUp 0.6s 0.2s both ease" }}>
                <div style={{ fontSize: 11, letterSpacing: 4, color: "var(--brass)", opacity: 0.3, textTransform: "uppercase", marginBottom: 14, textAlign: "center" }}>Materialien</div>
                <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                  {activeCard.bilder.map((img, i) => (
                    <img key={i} src={img} className="gallery-img" alt="" loading="lazy"
                      onClick={(e) => { e.stopPropagation(); setLightbox(img); }}
                      style={{ animationDelay: `${0.3 + i * 0.1}s` }} />
                  ))}
                </div>
              </div>
            )}

            {/* NAV */}
            {karten.length > 1 && (
              <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 20, marginTop: 36 }}>
                <button className="btn btn-ghost" onClick={(e) => { e.stopPropagation(); navCard(-1); }} style={{ borderRadius: "50%", width: 44, height: 44, padding: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>←</button>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  {karten.map((_, i) => (
                    <div key={i} className="nav-dot" onClick={(e) => { e.stopPropagation(); setFlipped(false); setTimeout(() => { setCardIdx(i); setActiveCard(karten[i]); }, 150); }}
                      style={{ background: i === cardIdx ? "var(--brass)" : "rgba(207,157,123,0.2)", width: i === cardIdx ? 10 : 8, height: i === cardIdx ? 10 : 8 }} />
                  ))}
                </div>
                <button className="btn btn-ghost" onClick={(e) => { e.stopPropagation(); navCard(1); }} style={{ borderRadius: "50%", width: 44, height: 44, padding: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>→</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* LIGHTBOX */}
      {lightbox && (
        <div className="overlay" onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="" style={{ maxWidth: "92%", maxHeight: "88vh", borderRadius: 16, objectFit: "contain", animation: "fadeScale 0.35s ease", boxShadow: "0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(207,157,123,0.08)" }} />
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
