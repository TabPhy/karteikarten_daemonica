<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zeitleiste</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<style>
  .timeline { position: relative; max-width: 700px; margin: 0 auto; padding: 20px 0; }
  .timeline::before {
    content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
    width: 2px; background: linear-gradient(180deg, transparent, var(--coffee), var(--brass), var(--coffee), transparent);
    transform: translateX(-50%);
  }
  @media (max-width: 600px) {
    .timeline::before { left: 24px; }
  }

  .tl-event {
    position: relative; margin-bottom: 40px; display: flex; align-items: flex-start;
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.6s, transform 0.6s cubic-bezier(.4,0,.2,1);
  }
  .tl-event.visible { opacity: 1; transform: translateY(0); }
  .tl-event:nth-child(odd) { flex-direction: row-reverse; }
  @media (max-width: 600px) { .tl-event, .tl-event:nth-child(odd) { flex-direction: row; } }

  .tl-content {
    width: 45%; padding: 24px; border-radius: 16px;
    background: linear-gradient(150deg, var(--jungle), var(--jet));
    border: 1px solid rgba(207,157,123,0.08);
    transition: all 0.4s;
    position: relative; overflow: hidden;
  }
  .tl-content:hover {
    border-color: rgba(207,157,123,0.2);
    box-shadow: 0 16px 40px rgba(0,0,0,0.3), 0 0 20px rgba(207,157,123,0.04);
    transform: translateY(-3px);
  }
  @media (max-width: 600px) {
    .tl-content { width: calc(100% - 60px); margin-left: 16px; }
  }

  .tl-dot {
    position: absolute; left: 50%; top: 28px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--brass); border: 3px solid var(--black);
    transform: translateX(-50%); z-index: 2;
    box-shadow: 0 0 0 4px rgba(207,157,123,0.1);
    transition: box-shadow 0.4s;
  }
  .tl-event:hover .tl-dot { box-shadow: 0 0 0 8px rgba(207,157,123,0.15), 0 0 20px rgba(207,157,123,0.2); }
  @media (max-width: 600px) { .tl-dot { left: 24px; } }

  .tl-date {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--brass); opacity: 0.5; margin-bottom: 8px; font-weight: 600;
  }
  .tl-title {
    font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700;
    color: var(--brass-light); margin-bottom: 8px; line-height: 1.3;
  }
  .tl-text { font-size: 13px; color: var(--brass); opacity: 0.5; line-height: 1.7; }
  .tl-img {
    width: 100%; border-radius: 10px; margin-top: 14px; opacity: 0.8;
    border: 1px solid rgba(207,157,123,0.08); transition: opacity 0.3s;
  }
  .tl-img:hover { opacity: 1; }
  .tl-tag {
    display: inline-block; font-size: 10px; padding: 3px 10px; border-radius: 20px;
    background: rgba(207,157,123,0.08); border: 1px solid rgba(207,157,123,0.12);
    color: var(--brass); opacity: 0.6; margin-top: 10px; margin-right: 4px;
  }
  .tl-tag.highlight { background: rgba(67,233,123,0.08); border-color: rgba(67,233,123,0.15); color: #6ee7b7; }

  .filter-bar { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 32px; }
  .filter-btn {
    background: rgba(207,157,123,0.05); color: var(--brass); border: 1px solid rgba(207,157,123,0.1);
    border-radius: 20px; padding: 6px 16px; font-size: 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.3s;
  }
  .filter-btn:hover { background: rgba(207,157,123,0.1); }
  .filter-btn.active { background: rgba(207,157,123,0.14); border-color: rgba(207,157,123,0.3); color: var(--brass-light); }
</style>
</head>
<body>
<script src="shared.js"></script>
<script>initSharedUI('timeline');</script>
<div class="page-wrap" id="app">
  <header style="text-align:center;margin-bottom:40px">
    <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">🗺️  Chronologie</div>
    <h1 class="serif" style="font-size:48px;font-weight:800;color:var(--brass-light);animation:slideUp .6s ease both">Zeitleiste</h1>
    <div class="divider" style="margin:18px auto 0"></div>
    <p style="color:var(--brass);opacity:0.35;margin-top:14px;font-size:14px;font-weight:300;animation:fadeIn 1s .3s both">Der Verlauf der Geschichte</p>
  </header>
  <div id="filter-container"></div>
  <div id="timeline-container"></div>
</div>

<script>
let allEvents=[], activeFilter='alle';

fetch('timeline.json')
  .then(r=>{if(!r.ok) throw new Error(); return r.json();})
  .then(data=>{
    allEvents=data;
    buildFilters();
    renderTimeline();
    observeEvents();
  })
  .catch(()=>{
    document.getElementById('timeline-container').innerHTML=`
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:56px;margin-bottom:16px;opacity:0.4;animation:float 3s infinite ease-in-out">🗺️</div>
        <p class="serif" style="font-size:20px;color:var(--brass-light);opacity:0.5;margin-bottom:8px">Keine Zeitleiste gefunden</p>
        <p style="font-size:13px;color:var(--brass);opacity:0.3">Erstelle eine <code style="background:rgba(207,157,123,0.1);padding:2px 8px;border-radius:6px">timeline.json</code></p>
      </div>`;
  });

function buildFilters(){
  const tags=new Set(); allEvents.forEach(e=>(e.tags||[]).forEach(t=>tags.add(t)));
  if(!tags.size) return;
  const fc=document.getElementById('filter-container');
  fc.innerHTML=`<div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('alle')">Alle</button>
    ${[...tags].map(t=>`<button class="filter-btn" onclick="setFilter('${t}')">${t}</button>`).join('')}
  </div>`;
}

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active', b.textContent===f||(f==='alle'&&b.textContent==='Alle')));
  renderTimeline();
  setTimeout(observeEvents,50);
}

function renderTimeline(){
  const events=activeFilter==='alle'?allEvents:allEvents.filter(e=>(e.tags||[]).includes(activeFilter));
  const tc=document.getElementById('timeline-container');

  if(!events.length){
    tc.innerHTML=`<p style="text-align:center;color:var(--brass);opacity:0.3;padding:40px">Keine Ereignisse für diesen Filter</p>`;
    return;
  }

  tc.innerHTML=`<div class="timeline">${events.map((ev,i)=>`
    <div class="tl-event" data-idx="${i}">
      <div class="tl-dot"></div>
      <div class="tl-content">
        ${ev.datum?`<div class="tl-date">${ev.datum}</div>`:''}
        <div class="tl-title">${ev.titel}</div>
        ${ev.text?`<div class="tl-text">${ev.text}</div>`:''}
        ${ev.bild?`<img class="tl-img" src="${ev.bild}" alt="${ev.titel}" loading="lazy"/>`:''}
        ${(ev.tags||[]).map(t=>`<span class="tl-tag ${t===activeFilter?'highlight':''}">${t}</span>`).join('')}
      </div>
    </div>`).join('')}</div>`;
}

function observeEvents(){
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});
  },{threshold:0.15});
  document.querySelectorAll('.tl-event').forEach(el=>observer.observe(el));
}
</script>
</body>
</html>
