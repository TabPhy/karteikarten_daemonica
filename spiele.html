<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spiele</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<style>
  .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
  .game-card {
    display: block; text-decoration: none; color: inherit;
    background: linear-gradient(150deg, var(--jungle), var(--jet));
    border: 1px solid rgba(207,157,123,0.08); border-radius: 18px;
    padding: 30px 24px; text-align: center; position: relative; overflow: hidden;
    transition: all 0.5s cubic-bezier(.4,0,.2,1); cursor: pointer;
  }
  .game-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(207,157,123,0.1),transparent 60%); opacity:0; transition:opacity .5s; }
  .game-card:hover::before { opacity:1; }
  .game-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(207,157,123,0.05); border-color: rgba(207,157,123,0.2); }
  .game-icon { font-size: 44px; margin-bottom: 14px; display: block; }
  .game-title { font-family: 'Playfair Display',serif; font-size: 20px; font-weight: 700; color: var(--brass-light); margin-bottom: 6px; }
  .game-desc { font-size: 12px; color: var(--brass); opacity: 0.4; line-height: 1.5; }
</style>
</head>
<body>
<script src="shared.js"></script>
<script>initSharedUI('spiele');</script>
<div class="page-wrap">
  <header style="text-align:center;margin-bottom:48px">
    <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">🎮  Spielecke</div>
    <h1 class="serif" style="font-size:48px;font-weight:800;color:var(--brass-light);animation:slideUp .6s ease both">Spiele</h1>
    <div class="divider" style="margin:18px auto 0"></div>
    <p style="color:var(--brass);opacity:0.35;margin-top:14px;font-size:14px;font-weight:300;animation:fadeIn 1s .3s both">Eine kleine Pause gefällig?</p>
  </header>
  <div class="games-grid">
    <a href="spiel.html" class="game-card" style="animation:slideUp .5s 0s both ease"><span class="game-icon">🃏</span><div class="game-title">Memory</div><div class="game-desc">Finde alle Paare</div></a>
    <a href="wortspiel.html" class="game-card" style="animation:slideUp .5s .06s both ease"><span class="game-icon">✏️</span><div class="game-title">Buchstabensalat</div><div class="game-desc">Wörter entwirren</div></a>
    <a href="tictactoe.html" class="game-card" style="animation:slideUp .5s .12s both ease"><span class="game-icon">⭕</span><div class="game-title">Tic Tac Toe</div><div class="game-desc">Gegen die KI spielen</div></a>
    <a href="hangman.html" class="game-card" style="animation:slideUp .5s .18s both ease"><span class="game-icon">💀</span><div class="game-title">Galgenmännchen</div><div class="game-desc">Buchstabe für Buchstabe</div></a>
    <a href="wordle.html" class="game-card" style="animation:slideUp .5s .24s both ease"><span class="game-icon">🟩</span><div class="game-title">Wordle</div><div class="game-desc">5 Buchstaben, 6 Versuche</div></a>
    <a href="typing.html" class="game-card" style="animation:slideUp .5s .30s both ease"><span class="game-icon">⌨️</span><div class="game-title">Typing Test</div><div class="game-desc">Wie schnell tippst du?</div></a>
  </div>
</div>
</body>
</html>
