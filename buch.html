<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mein Buch</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  .book-container {
    max-width: 800px; margin: 0 auto;
    animation: fadeScale 0.6s ease both;
  }

  .pdf-controls {
    display: flex; justify-content: center; align-items: center; gap: 16px;
    margin-bottom: 24px; flex-wrap: wrap;
    animation: slideDown 0.5s 0.2s both ease;
  }

  .page-display {
    font-family: 'Playfair Display', serif; font-size: 16px;
    color: var(--brass); opacity: 0.6; min-width: 100px; text-align: center;
  }

  .canvas-wrap {
    position: relative; display: flex; justify-content: center;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(207,157,123,0.04);
    border: 1px solid rgba(207,157,123,0.08);
    background: var(--jungle);
    transition: box-shadow 0.5s;
  }
  .canvas-wrap:hover {
    box-shadow: 0 24px 70px rgba(0,0,0,0.5), 0 0 50px rgba(207,157,123,0.06);
  }
  .canvas-wrap canvas { display: block; max-width: 100%; height: auto; }

  .empty-state {
    text-align: center; padding: 80px 30px;
    animation: fadeIn 0.8s ease;
  }
  .empty-state .icon {
    font-size: 72px; margin-bottom: 24px; opacity: 0.5;
    animation: float 3s infinite ease-in-out;
  }

  .file-zone {
    border: 2px dashed rgba(207,157,123,0.15); border-radius: 20px;
    padding: 40px; text-align: center; cursor: pointer;
    transition: all 0.4s; margin-top: 24px; max-width: 400px;
    margin-left: auto; margin-right: auto;
  }
  .file-zone:hover { border-color: var(--brass); background: rgba(207,157,123,0.03); }

  .zoom-slider {
    -webkit-appearance: none; appearance: none; width: 100px; height: 3px;
    background: rgba(207,157,123,0.2); border-radius: 2px; outline: none;
  }
  .zoom-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--brass); cursor: pointer; border: none;
  }

  .page-thumbs {
    display: flex; gap: 8px; overflow-x: auto; padding: 16px 0;
    margin-top: 20px; justify-content: center; flex-wrap: wrap;
  }
  .page-thumb {
    width: 48px; height: 64px; border-radius: 6px;
    background: rgba(207,157,123,0.06); border: 1px solid rgba(207,157,123,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--brass); opacity: 0.5;
    cursor: pointer; transition: all 0.3s; flex-shrink: 0;
  }
  .page-thumb:hover { opacity: 0.8; border-color: rgba(207,157,123,0.3); transform: translateY(-2px); }
  .page-thumb.active { opacity: 1; border-color: var(--brass); background: rgba(207,157,123,0.12); }

  .loading-bar {
    height: 3px; background: rgba(207,157,123,0.1); border-radius: 2px;
    overflow: hidden; margin: 20px auto; max-width: 200px;
  }
  .loading-bar-inner {
    height: 100%; background: linear-gradient(90deg, var(--coffee), var(--brass));
    border-radius: 2px; animation: shimmer 1.5s infinite;
    background-size: 200% 100%;
  }
</style>
</head>
<body>
<script src="shared.js"></script>
<script>initSharedUI('buch');</script>
<div class="page-wrap" id="app"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdf = null, pageNum = 1, totalPages = 0, scale = 1.5, rendering = false;

function renderPage(num) {
  if (!pdf || rendering) return;
  rendering = true;
  pdf.getPage(num).then(page => {
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const viewport = page.getViewport({ scale });
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
      rendering = false;
      updateControls();
    });
  });
}

function updateControls() {
  const pd = document.getElementById('page-display');
  if (pd) pd.textContent = `${pageNum} / ${totalPages}`;
  document.querySelectorAll('.page-thumb').forEach((t, i) => {
    t.classList.toggle('active', i + 1 === pageNum);
  });
}

function goPage(n) {
  if (n < 1 || n > totalPages) return;
  pageNum = n; renderPage(pageNum);
}

function changeZoom(val) {
  scale = parseFloat(val);
  renderPage(pageNum);
}

function loadPDF(src) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <header style="text-align:center;margin-bottom:32px">
      <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">📖  Mein Buch</div>
      <h1 class="serif" style="font-size:44px;font-weight:800;color:var(--brass-light);line-height:1.1;animation:slideUp .6s ease both">Leseansicht</h1>
      <div class="divider" style="margin:18px auto 0"></div>
      <div class="loading-bar" id="load-bar"><div class="loading-bar-inner" style="width:30%"></div></div>
    </header>`;

  pdfjsLib.getDocument(src).promise.then(pdfDoc => {
    pdf = pdfDoc;
    totalPages = pdf.numPages;
    pageNum = 1;
    showViewer();
    renderPage(1);
  }).catch(err => {
    app.innerHTML += `<p style="text-align:center;color:rgba(200,100,100,0.7);font-size:14px;margin-top:20px">Fehler beim Laden: ${err.message}</p>`;
  });
}

function showViewer() {
  const app = document.getElementById('app');
  const thumbs = Array.from({length: totalPages}, (_, i) =>
    `<div class="page-thumb ${i===0?'active':''}" onclick="goPage(${i+1})">${i+1}</div>`
  ).join('');

  app.innerHTML = `
    <header style="text-align:center;margin-bottom:28px">
      <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">📖  Mein Buch</div>
      <h1 class="serif" style="font-size:44px;font-weight:800;color:var(--brass-light);line-height:1.1;animation:slideUp .6s ease both">Leseansicht</h1>
      <div class="divider" style="margin:18px auto 0"></div>
    </header>
    <div class="book-container">
      <div class="pdf-controls">
        <button class="btn btn-ghost" onclick="goPage(pageNum-1)" style="padding:8px 14px">← Zurück</button>
        <div id="page-display" class="page-display">1 / ${totalPages}</div>
        <button class="btn btn-ghost" onclick="goPage(pageNum+1)" style="padding:8px 14px">Weiter →</button>
        <div style="display:flex;align-items:center;gap:8px;margin-left:12px">
          <span style="font-size:11px;color:var(--brass);opacity:0.4">🔍</span>
          <input type="range" class="zoom-slider" min="0.8" max="3" step="0.1" value="${scale}" oninput="changeZoom(this.value)">
        </div>
      </div>
      <div class="canvas-wrap"><canvas id="pdf-canvas"></canvas></div>
      ${totalPages <= 40 ? `<div class="page-thumbs">${thumbs}</div>` : ''}
    </div>`;
}

function showEmpty() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <header style="text-align:center;margin-bottom:20px">
      <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">📖  Mein Buch</div>
      <h1 class="serif" style="font-size:44px;font-weight:800;color:var(--brass-light);line-height:1.1;animation:slideUp .6s ease both">Leseansicht</h1>
      <div class="divider" style="margin:18px auto 0"></div>
    </header>
    <div class="empty-state">
      <div class="icon">📖</div>
      <p class="serif" style="font-size:22px;color:var(--brass-light);opacity:0.6;margin-bottom:8px">Kein Buch geladen</p>
      <p style="font-size:13px;color:var(--brass);opacity:0.35;line-height:1.6;max-width:360px;margin:0 auto">
        Lege eine <code style="background:rgba(207,157,123,0.1);padding:2px 8px;border-radius:6px">buch.pdf</code> in denselben Ordner wie diese Datei — oder wähle eine PDF aus:
      </p>
      <div class="file-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div style="font-size:28px;margin-bottom:10px;opacity:0.4">📄</div>
        <div style="font-size:13px;color:var(--brass);opacity:0.5">PDF hierher ziehen oder klicken</div>
        <input type="file" id="file-input" accept=".pdf" hidden>
      </div>
    </div>`;

  const input = document.getElementById('file-input');
  input.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) { const r = new FileReader(); r.onload = ev => loadPDF({data: new Uint8Array(ev.target.result)}); r.readAsArrayBuffer(file); }
  });

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'var(--brass)'; dz.style.background = 'rgba(207,157,123,0.05)'; });
  dz.addEventListener('dragleave', () => { dz.style.borderColor = ''; dz.style.background = ''; });
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.style.borderColor = ''; dz.style.background = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
      const r = new FileReader(); r.onload = ev => loadPDF({data: new Uint8Array(ev.target.result)}); r.readAsArrayBuffer(file);
    }
  });
}

// Try loading buch.pdf automatically, fall back to upload UI
fetch('buch.pdf', { method: 'HEAD' }).then(r => {
  if (r.ok) loadPDF('buch.pdf'); else showEmpty();
}).catch(() => showEmpty());
</script>
</body>
</html>
