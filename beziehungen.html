<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beziehungen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<style>
  .graph-canvas {
    width: 100%; aspect-ratio: 4/3; max-height: 70vh;
    background: linear-gradient(150deg, rgba(22,33,39,0.5), rgba(58,53,52,0.2));
    border: 1px solid rgba(207,157,123,0.06); border-radius: 20px;
    position: relative; overflow: hidden; cursor: grab;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .graph-canvas:active { cursor: grabbing; }
  .graph-canvas svg { width: 100%; height: 100%; }

  .edge-line { stroke-width: 2; fill: none; opacity: 0.4; transition: opacity 0.3s; }
  .edge-line:hover { opacity: 0.8; }
  .edge-label {
    font-family: 'Inter', sans-serif; font-size: 10px; fill: var(--brass);
    opacity: 0.5; text-anchor: middle; pointer-events: none;
  }

  .node-group { cursor: pointer; }
  .node-circle {
    stroke-width: 2; transition: all 0.3s;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  .node-group:hover .node-circle { stroke-width: 3; filter: drop-shadow(0 4px 16px rgba(207,157,123,0.3)); }
  .node-name {
    font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 700;
    fill: var(--cream); text-anchor: middle;
  }
  .node-role {
    font-family: 'Inter', sans-serif; font-size: 9px;
    fill: var(--brass); opacity: 0.5; text-anchor: middle;
  }
  .node-avatar { font-size: 24px; text-anchor: middle; dominant-baseline: central; }

  .detail-panel {
    position: absolute; right: 20px; top: 20px;
    width: 260px; background: linear-gradient(150deg, var(--jungle), var(--jet));
    border: 1px solid rgba(207,157,123,0.15); border-radius: 16px;
    padding: 24px; z-index: 10; animation: fadeScale 0.3s ease;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  }
  .detail-close {
    position: absolute; top: 10px; right: 14px; background: none; border: none;
    color: var(--brass); opacity: 0.4; cursor: pointer; font-size: 16px; transition: opacity 0.2s;
  }
  .detail-close:hover { opacity: 0.8; }
  .detail-avatar {
    width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
    border: 2px solid rgba(207,157,123,0.2); margin-bottom: 10px;
  }

  .rel-type-freund { stroke: #6ee7b7; }
  .rel-type-feind { stroke: #e08080; }
  .rel-type-familie { stroke: #93c5fd; }
  .rel-type-liebe { stroke: #f9a8d4; }
  .rel-type-neutral { stroke: rgba(207,157,123,0.4); }
  .rel-type-mentor { stroke: #fcd34d; }

  .legend { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:20px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--brass); opacity:0.5; }
  .legend-dot { width:16px; height:3px; border-radius:2px; }
</style>
</head>
<body>
<script src="shared.js"></script>
<script>initSharedUI('beziehungen');</script>
<div class="page-wrap" id="app">
  <header style="text-align:center;margin-bottom:36px">
    <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">👥  Netzwerk</div>
    <h1 class="serif" style="font-size:48px;font-weight:800;color:var(--brass-light);animation:slideUp .6s ease both">Beziehungen</h1>
    <div class="divider" style="margin:18px auto 0"></div>
    <p style="color:var(--brass);opacity:0.35;margin-top:14px;font-size:14px;font-weight:300;animation:fadeIn 1s .3s both">Wer kennt wen — und warum</p>
  </header>
  <div id="graph-container"></div>
</div>

<script>
const REL_COLORS = {
  freund:'#6ee7b7', feind:'#e08080', familie:'#93c5fd',
  liebe:'#f9a8d4', neutral:'rgba(207,157,123,0.4)', mentor:'#fcd34d'
};

let data=null, cardImages={}, selected=null, nodePositions=[];

// Load both beziehungen.json and cards.json in parallel
Promise.all([
  fetch('beziehungen.json').then(r=>{if(!r.ok)throw new Error();return r.json();}),
  fetch('cards.json').then(r=>r.ok?r.json():null).catch(()=>null)
]).then(([bezData, cardsData])=>{
  data=bezData;

  if(!data || !data.charaktere){
    throw new Error('beziehungen.json hat kein "charaktere"-Feld');
  }

  // Build a lookup: character name → first image from cards.json
  if(cardsData){
    for(const[cat, meta] of Object.entries(cardsData)){
      const karten=meta.karten||[];
      for(const karte of karten){
        const imgs=karte.bilder||[];
        if(imgs.length>0){
          const name=karte.titel.trim().toLowerCase();
          if(!cardImages[name]) cardImages[name]=imgs[0];
        }
      }
    }
  }

  layoutAndRender();
}).catch((err)=>{
  console.error('Beziehungen laden fehlgeschlagen:', err);
  document.getElementById('graph-container').innerHTML=`
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:56px;margin-bottom:16px;opacity:0.4;animation:float 3s infinite ease-in-out">👥</div>
      <p class="serif" style="font-size:20px;color:var(--brass-light);opacity:0.5;margin-bottom:8px">Keine Beziehungsdaten</p>
      <p style="font-size:13px;color:var(--brass);opacity:0.3">Erstelle eine <code style="background:rgba(207,157,123,0.1);padding:2px 8px;border-radius:6px">beziehungen.json</code></p>
      <p style="font-size:11px;color:rgba(200,100,100,0.5);margin-top:12px;font-family:monospace">${err.message||err}</p>
    </div>`;
});

function getCharImage(name){
  // Try exact match first, then case-insensitive
  return cardImages[name.toLowerCase()] || null;
}

function layoutAndRender(){
  const n=data.charaktere.length;
  const cx=450, cy=300, radius=Math.min(220, 100+n*18);
  nodePositions=data.charaktere.map((ch,i)=>{
    const angle=(2*Math.PI*i/n)-Math.PI/2;
    return {
      ...ch,
      x: cx+Math.cos(angle)*radius,
      y: cy+Math.sin(angle)*radius,
      img: getCharImage(ch.name)
    };
  });
  render();
}

function selectNode(name){
  selected=selected===name?null:name;
  render();
}

function render(){
  const gc=document.getElementById('graph-container');
  const R=32; // node radius

  // Build defs for clipping circles (for images)
  const defs=nodePositions.filter(n=>n.img).map((n,i)=>`
    <clipPath id="clip-${i}"><circle cx="${n.x}" cy="${n.y}" r="${R-2}"/></clipPath>
  `).join('');

  const edges=data.beziehungen.map(b=>{
    const from=nodePositions.find(n=>n.name===b.von);
    const to=nodePositions.find(n=>n.name===b.zu);
    if(!from||!to) return '';
    const mx=(from.x+to.x)/2, my=(from.y+to.y)/2;
    const color=REL_COLORS[b.typ]||REL_COLORS.neutral;
    const highlight=selected&&(b.von===selected||b.zu===selected);
    return `
      <line x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}"
        class="edge-line" stroke="${color}" style="opacity:${highlight?0.8:selected?0.1:0.35}"/>
      <text x="${mx}" y="${my-8}" class="edge-label" style="opacity:${highlight?0.7:selected?0.05:0.4}">${b.label||b.typ}</text>
    `;
  }).join('');

  const nodes=nodePositions.map((n,i)=>{
    const isSelected=n.name===selected;
    const isConnected=!selected||selected===n.name||data.beziehungen.some(b=>(b.von===selected&&b.zu===n.name)||(b.zu===selected&&b.von===n.name));
    const hasImg=!!n.img;

    return `
      <g class="node-group" onclick="selectNode('${n.name}')" style="opacity:${isConnected?1:0.15};transition:opacity .4s">
        <circle cx="${n.x}" cy="${n.y}" r="${R}" class="node-circle"
          fill="${hasImg?'rgba(22,33,39,0.3)':isSelected?'rgba(207,157,123,0.2)':'rgba(22,33,39,0.9)'}"
          stroke="${isSelected?'var(--brass)':'rgba(207,157,123,0.2)'}"/>
        ${hasImg
          ? `<image href="${n.img}" x="${n.x-R+2}" y="${n.y-R+2}" width="${(R-2)*2}" height="${(R-2)*2}"
              clip-path="url(#clip-${i})" preserveAspectRatio="xMidYMid slice"
              style="opacity:${isConnected?0.9:0.3};transition:opacity .4s"/>`
          : `<text x="${n.x}" y="${n.y}" class="node-avatar">${n.icon||'👤'}</text>`
        }
        ${isSelected?`<circle cx="${n.x}" cy="${n.y}" r="${R+4}" fill="none" stroke="var(--brass)" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 3"/>`:''}
        <text x="${n.x}" y="${n.y+R+16}" class="node-name">${n.name}</text>
        ${n.rolle?`<text x="${n.x}" y="${n.y+R+28}" class="node-role">${n.rolle}</text>`:''}
      </g>`;
  }).join('');

  const selChar=selected?nodePositions.find(n=>n.name===selected):null;
  const selRels=selected?data.beziehungen.filter(b=>b.von===selected||b.zu===selected):[];

  gc.innerHTML=`
    <div class="graph-canvas" style="animation:fadeScale .6s ease">
      <svg viewBox="0 0 900 600">
        <defs>${defs}</defs>
        ${edges}${nodes}
      </svg>
      ${selChar?`
        <div class="detail-panel">
          <button class="detail-close" onclick="selectNode(null)">✕</button>
          ${selChar.img
            ?`<img class="detail-avatar" src="${selChar.img}" alt="${selChar.name}"/>`
            :`<div style="font-size:40px;margin-bottom:8px">${selChar.icon||'👤'}</div>`
          }
          <div class="serif" style="font-size:20px;color:var(--brass-light);margin-bottom:4px">${selChar.name}</div>
          ${selChar.rolle?`<div style="font-size:11px;color:var(--brass);opacity:0.4;margin-bottom:12px">${selChar.rolle}</div>`:''}
          ${selChar.beschreibung?`<div style="font-size:12px;color:var(--brass);opacity:0.5;line-height:1.6;margin-bottom:14px">${selChar.beschreibung}</div>`:''}
          ${selRels.length?`<div style="font-size:10px;letter-spacing:2px;color:var(--brass);opacity:0.3;text-transform:uppercase;margin-bottom:8px">Beziehungen</div>
            ${selRels.map(r=>{
              const otherName=r.von===selected?r.zu:r.von;
              const otherNode=nodePositions.find(n=>n.name===otherName);
              const color=REL_COLORS[r.typ]||REL_COLORS.neutral;
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                ${otherNode&&otherNode.img
                  ?`<img src="${otherNode.img}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;border:1px solid ${color};flex-shrink:0"/>`
                  :`<div style="width:22px;height:22px;border-radius:50%;background:rgba(207,157,123,0.1);border:1px solid ${color};display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">${otherNode?otherNode.icon||'👤':'👤'}</div>`
                }
                <span style="font-size:12px;color:var(--cream);opacity:0.7">${otherName}</span>
                <span style="font-size:10px;color:var(--brass);opacity:0.35;margin-left:auto">${r.label||r.typ}</span>
              </div>`;
            }).join('')}
          `:''}
        </div>
      `:''}
    </div>
    <div class="legend">
      ${Object.entries(REL_COLORS).map(([k,v])=>`<div class="legend-item"><div class="legend-dot" style="background:${v}"></div>${k.charAt(0).toUpperCase()+k.slice(1)}</div>`).join('')}
    </div>`;
}
</script>
</body>
</html>
