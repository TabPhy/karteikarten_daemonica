<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Galgenmännchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<style>
  .hangman-wrap { display:flex; flex-direction:column; align-items:center; gap:28px; }
  .gallows-svg { filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3)); }
  .gallows-svg line, .gallows-svg circle { stroke: var(--brass); stroke-width: 3; stroke-linecap: round; fill: none; }
  .body-part { opacity: 0; transition: opacity 0.4s; }
  .body-part.show { opacity: 1; animation: popIn 0.4s ease; }

  .word-display { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
  .letter-blank {
    width:40px; height:50px; border-bottom:3px solid rgba(207,157,123,0.2);
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif; font-size:28px; font-weight:700;
    color:var(--brass-light); transition: all 0.3s;
  }
  .letter-blank.revealed { border-color:var(--brass); animation:popIn .3s ease; }
  .letter-blank.wrong-reveal { color:#e08080; border-color:rgba(200,80,80,0.4); }

  .keyboard { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; max-width:460px; margin:0 auto; }
  .key-btn {
    width:38px; height:42px; border-radius:10px; border:1px solid rgba(207,157,123,0.12);
    background:linear-gradient(150deg,var(--jungle),var(--jet));
    color:var(--brass); font-family:'Inter',sans-serif; font-size:15px; font-weight:600;
    cursor:pointer; transition:all .3s; display:flex; align-items:center; justify-content:center;
  }
  .key-btn:hover { border-color:rgba(207,157,123,0.35); transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,0.3); }
  .key-btn.correct { background:rgba(67,233,123,0.12); border-color:rgba(67,233,123,0.3); color:#6ee7b7; pointer-events:none; }
  .key-btn.wrong { background:rgba(200,60,60,0.08); border-color:rgba(200,60,60,0.15); color:rgba(200,100,100,0.4); pointer-events:none; }

  .hint-bar { font-size:13px; color:var(--brass); opacity:0.4; font-style:italic; text-align:center; min-height:20px; }
  .lives-bar { display:flex; gap:4px; justify-content:center; }
  .life-dot { width:10px; height:10px; border-radius:50%; background:var(--brass); transition:all .3s; }
  .life-dot.lost { background:rgba(200,80,80,0.3); transform:scale(0.7); }

  .result-area { text-align:center; padding:24px; border-radius:16px; animation:fadeScale .4s ease; max-width:400px; margin:0 auto; }
</style>
</head>
<body>
<script src="shared.js"></script>
<script>initSharedUI('hangman');</script>
<div class="page-wrap" id="app"></div>

<script>
const WORDS=[
  {word:"KAPITEL",hint:"Ein Abschnitt im Buch"},
  {word:"PROLOG",hint:"Bevor die Geschichte beginnt"},
  {word:"EPILOG",hint:"Nach dem Ende"},
  {word:"METAPHER",hint:"Sprachliches Bild"},
  {word:"NOVELLE",hint:"Kürzer als ein Roman"},
  {word:"BALLADE",hint:"Erzählendes Gedicht"},
  {word:"CHRONIK",hint:"Zeitliche Aufzeichnung"},
  {word:"KONFLIKT",hint:"Motor der Handlung"},
  {word:"STROPHE",hint:"Teil eines Gedichts"},
  {word:"MYTHOS",hint:"Göttergeschichte"},
  {word:"PARABEL",hint:"Gleichniserzählung"},
  {word:"IRONIE",hint:"Meint das Gegenteil"},
  {word:"LEITMOTIV",hint:"Kehrt immer wieder"},
  {word:"SONETT",hint:"14 Zeilen streng"},
  {word:"ROMAN",hint:"Langer Prosatext"},
  {word:"SYMBOL",hint:"Steht für etwas anderes"},
  {word:"DRAMA",hint:"Für die Bühne"},
  {word:"SATIRE",hint:"Spott mit Feder"},
  {word:"ELEGIE",hint:"Klagegedicht"},
  {word:"FABEL",hint:"Sprechende Tiere"},
];

const ALPHA="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
const MAX=7;
let word,hint,guessed,wrong,over;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function newGame(){
  const w=shuffle(WORDS)[0];
  word=w.word; hint=w.hint; guessed=new Set(); wrong=0; over=false;
  render();
}

function guess(ch){
  if(over||guessed.has(ch)) return;
  guessed.add(ch);
  if(!word.includes(ch)) wrong++;
  if(wrong>=MAX) over=true;
  if(word.split('').every(c=>guessed.has(c))) over=true;
  render();
}

function getSvgParts(){
  // Parts: base, pole, top, rope, head, body, left-arm, right-arm, left-leg, right-leg ... we use 7 steps
  return [
    `<line x1="20" y1="180" x2="80" y2="180"/>`, // base
    `<line x1="50" y1="180" x2="50" y2="30"/>`,   // pole
    `<line x1="50" y1="30" x2="120" y2="30"/>`,    // top
    `<line x1="120" y1="30" x2="120" y2="55"/>`,   // rope
    `<circle cx="120" cy="70" r="15"/>`,            // head
    `<line x1="120" y1="85" x2="120" y2="130"/>`,  // body
    `<line x1="120" y1="100" x2="100" y2="118"/><line x1="120" y1="100" x2="140" y2="118"/>`, // arms
    `<line x1="120" y1="130" x2="100" y2="160"/><line x1="120" y1="130" x2="140" y2="160"/>`, // legs
  ];
}

function render(){
  const app=document.getElementById('app');
  const won=word.split('').every(c=>guessed.has(c));
  const lost=wrong>=MAX;
  const parts=getSvgParts();

  app.innerHTML=`
    <header style="text-align:center;margin-bottom:32px">
      <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">💀  Minispiel</div>
      <h1 class="serif" style="font-size:44px;font-weight:800;color:var(--brass-light);animation:slideUp .6s ease both">Galgenmännchen</h1>
      <div class="divider" style="margin:18px auto 0"></div>
      <div style="margin-top:12px"><a href="spiele.html" class="btn btn-ghost" style="font-size:12px;padding:6px 14px;text-decoration:none">← Alle Spiele</a></div>
    </header>

    <div class="hangman-wrap">
      <div class="lives-bar">
        ${Array.from({length:MAX},(_,i)=>`<div class="life-dot ${i<wrong?'lost':''}"></div>`).join('')}
      </div>

      <svg class="gallows-svg" width="160" height="190" viewBox="0 0 160 190">
        ${parts.map((p,i)=>`<g class="body-part ${i<wrong+1?'show':''}">${p}</g>`).join('')}
      </svg>

      <div class="hint-bar">${hint}</div>

      <div class="word-display">
        ${word.split('').map(c=>{
          const show=guessed.has(c)||lost;
          return `<div class="letter-blank ${show?'revealed':''} ${lost&&!guessed.has(c)?'wrong-reveal':''}">${show?c:''}</div>`;
        }).join('')}
      </div>

      ${over?`
        <div class="result-area" style="background:${won?'rgba(67,233,123,0.06)':'rgba(200,60,60,0.06)'};border:1px solid ${won?'rgba(67,233,123,0.15)':'rgba(200,60,60,0.15)'}">
          <div style="font-size:36px;margin-bottom:8px">${won?'🎉':'💀'}</div>
          <div class="serif" style="font-size:20px;color:var(--brass-light);margin-bottom:6px">${won?'Gerettet!':'Verloren!'}</div>
          ${!won?`<div style="font-size:14px;color:var(--brass);opacity:0.5;margin-bottom:12px">Das Wort war: <strong>${word}</strong></div>`:''}
          <button class="btn btn-primary" onclick="newGame()" style="margin-top:8px;padding:10px 28px">Nochmal</button>
        </div>
      `:`
        <div class="keyboard">
          ${ALPHA.map(c=>{
            let cls='key-btn';
            if(guessed.has(c)) cls+=word.includes(c)?' correct':' wrong';
            return `<button class="${cls}" onclick="guess('${c}')">${c}</button>`;
          }).join('')}
        </div>
      `}
    </div>`;
}
newGame();
document.addEventListener('keydown',e=>{
  const c=e.key.toUpperCase();
  if(ALPHA.includes(c)&&!over) guess(c);
});
</script>
</body>
</html>
