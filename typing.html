<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Typing Test</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="shared.css" rel="stylesheet"/>
<style>
  .text-display {
    background: linear-gradient(150deg, var(--jungle), var(--jet));
    border: 1px solid rgba(207,157,123,0.08);
    border-radius: 20px; padding: 32px; max-width: 700px; margin: 0 auto;
    font-size: 20px; line-height: 1.8; font-family: 'Playfair Display', serif;
    position: relative; min-height: 120px; max-height: 220px;
    cursor: text; overflow-y: scroll;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    outline: none; user-select: none;
    word-wrap: break-word; overflow-wrap: break-word;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .text-display::-webkit-scrollbar { display: none; }
  .text-display:focus { border-color: rgba(207,157,123,0.2); box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 2px rgba(207,157,123,0.1); }

  .char { transition: color 0.05s; }
  .char.correct { color: #6ee7b7; }
  .char.wrong { color: #e08080; background: rgba(200,60,60,0.12); border-radius: 3px; }
  .char.current { border-left: 2px solid var(--brass); margin-left: -1px; animation: blink 1s step-end infinite; }
  .char.pending { color: rgba(207,157,123,0.3); }
  #text-chars { word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap; }

  .stats-row {
    display: flex; justify-content: center; gap: 36px; margin: 28px 0;
    animation: slideUp 0.5s 0.1s both ease;
  }
  .stat { text-align: center; }
  .stat-val {
    font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700;
    background: linear-gradient(135deg, var(--brass-light), var(--brass));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-lbl { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--brass); opacity: 0.35; margin-top: 4px; }

  .progress-bar { height: 4px; background: rgba(207,157,123,0.08); border-radius: 2px; max-width: 700px; margin: 20px auto 0; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--coffee), var(--brass)); border-radius: 2px; transition: width 0.3s; }

  .time-btns { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
  .time-btn {
    background: rgba(207,157,123,0.06); color: var(--brass);
    border: 1px solid rgba(207,157,123,0.12); border-radius: 10px;
    padding: 8px 18px; font-size: 13px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.3s;
  }
  .time-btn:hover { background: rgba(207,157,123,0.1); }
  .time-btn.active { background: rgba(207,157,123,0.14); border-color: rgba(207,157,123,0.3); color: var(--brass-light); }

  .result-card {
    max-width: 500px; margin: 32px auto; padding: 36px;
    background: linear-gradient(150deg, var(--jungle), var(--jet));
    border: 1px solid rgba(207,157,123,0.12); border-radius: 24px;
    text-align: center; animation: fadeScale 0.5s ease;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }

  .click-hint {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: rgba(12,21,25,0.6); border-radius: 20px;
    font-size: 14px; color: var(--brass); opacity: 0.6;
    transition: opacity 0.3s; pointer-events: none;
  }
  .click-hint.hidden { opacity: 0; }
</style>
</head>
<body>
<script src="shared.js"></script>
<script>initSharedUI('typing');</script>
<div class="page-wrap" id="app"></div>

<script>
const PASSAGES = [
  "Es war einmal eine Zeit, in der die Worte noch Gewicht hatten und jeder Satz wie ein Versprechen klang, das man nicht brechen durfte.",
  "Der alte Leuchtturm stand schweigend am Rand der Klippen. Sein Licht hatte seit Jahren nicht mehr die Dunkelheit durchbrochen.",
  "Sie öffnete das Buch und der Geruch alter Seiten stieg ihr entgegen wie eine Erinnerung an vergessene Nachmittage.",
  "Zwischen den Zeilen lauerten Geheimnisse, die nur der aufmerksame Leser zu entdecken vermochte. Jedes Wort war ein Schlüssel.",
  "Die Nacht breitete sich über das kleine Dorf aus wie ein samtener Vorhang. In der Ferne heulte ein Wolf seinen einsamen Gesang.",
  "Manchmal sind es die leisen Geschichten, die am lautesten nachhallen. Ein Flüstern kann lauter sein als ein Schrei.",
  "Der Wanderer folgte dem schmalen Pfad durch den Wald. Moos bedeckte die Steine und das Licht fiel in goldenen Streifen durch das Blätterdach.",
  "Worte sind wie Samen, die man in die Erde der Gedanken pflanzt. Manche blühen sofort, andere brauchen Jahre um zu wachsen.",
];

let text, typed, pos, started, startTime, elapsed, duration, timerInterval, done, errors, focused;

function init(dur) {
  duration = dur || duration || 30;
  text = PASSAGES[Math.floor(Math.random() * PASSAGES.length)];
  typed = [];
  pos = 0; started = false; startTime = 0; elapsed = 0; done = false; errors = 0; focused = false;
  clearInterval(timerInterval);
  renderFull();
}

function startTimer() {
  if (started) return;
  started = true;
  startTime = Date.now();
  timerInterval = setInterval(() => {
    elapsed = (Date.now() - startTime) / 1000;
    if (elapsed >= duration) { finish(); return; }
    updateStats();
  }, 200);
}

function handleKey(e) {
  if (done) return;
  e.preventDefault();

  const key = e.key;

  if (key === 'Backspace') {
    if (pos > 0) {
      pos--;
      if (typed[pos] !== text[pos]) errors = Math.max(0, errors - 1);
      typed.pop();
    }
    updateDisplay();
    return;
  }

  // Ignore non-character keys
  if (key.length > 1) return;

  // Start timer on first real keystroke
  startTimer();

  if (pos < text.length) {
    typed.push(key);
    if (key !== text[pos]) errors++;
    pos++;
    updateDisplay();

    if (pos >= text.length) finish();
  }
}

function finish() {
  clearInterval(timerInterval);
  done = true;
  elapsed = Math.min(elapsed || (Date.now() - startTime) / 1000, duration);
  renderFull();
}

function getWPM() {
  if (!elapsed) return 0;
  const correctChars = typed.filter((ch, i) => ch === text[i]).length;
  return Math.round((correctChars / 5) / (elapsed / 60));
}

function getAccuracy() {
  if (!pos) return 100;
  return Math.max(0, Math.round(((pos - errors) / pos) * 100));
}

function updateStats() {
  const wpmEl = document.getElementById('wpm');
  const timeEl = document.getElementById('time-left');
  const accEl = document.getElementById('acc');
  if (wpmEl) wpmEl.textContent = getWPM();
  if (timeEl) timeEl.textContent = Math.max(0, Math.ceil(duration - elapsed));
  if (accEl) accEl.textContent = getAccuracy() + '%';
  const bar = document.getElementById('progress-fill');
  if (bar) bar.style.width = `${Math.min(100, (elapsed / duration) * 100)}%`;
}

function buildCharsHTML() {
  let html = '';
  for (let i = 0; i < text.length; i++) {
    const isSpace = text[i] === ' ';
    const display = isSpace ? ' ' : text[i].replace(/</g, '&lt;');
    let cls = 'char';
    if (isSpace) cls += ' space';
    if (i < pos) {
      cls += typed[i] === text[i] ? ' correct' : ' wrong';
    } else if (i === pos) {
      cls += ' current pending';
    } else {
      cls += ' pending';
    }
    html += `<span class="${cls}">${display}</span>`;
  }
  return html;
}

function updateDisplay() {
  const display = document.getElementById('text-chars');
  if (display) {
    display.innerHTML = buildCharsHTML();
    // Scroll to keep cursor visible
    const cursor = display.querySelector('.current');
    if (cursor) {
      const container = document.getElementById('text-display');
      const cursorTop = cursor.offsetTop;
      const containerH = container.clientHeight;
      const padding = 32;
      // Scroll so the current line is near the top
      if (cursorTop > containerH * 0.5) {
        container.scrollTop = cursorTop - padding;
      }
    }
  }
  updateStats();
  const hint = document.getElementById('click-hint');
  if (hint && started) hint.classList.add('hidden');
}

function focusDisplay() {
  const el = document.getElementById('text-display');
  if (el) { el.focus(); focused = true; }
  const hint = document.getElementById('click-hint');
  if (hint && !started) hint.textContent = 'Fang an zu tippen...';
}

function renderFull() {
  const app = document.getElementById('app');
  const wpm = getWPM(), acc = getAccuracy();

  if (done) {
    app.innerHTML = `
      <header style="text-align:center;margin-bottom:28px">
        <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px">⌨️  Minispiel</div>
        <h1 class="serif" style="font-size:44px;font-weight:800;color:var(--brass-light)">Typing Test</h1>
        <div class="divider" style="margin:18px auto 0"></div>
        <div style="margin-top:10px"><a href="spiele.html" class="btn btn-ghost" style="font-size:12px;padding:6px 14px;text-decoration:none">← Alle Spiele</a></div>
      </header>
      <div class="result-card">
        <div style="font-size:52px;margin-bottom:12px">${wpm>=60?'🔥':wpm>=40?'⚡':wpm>=20?'✨':'🐌'}</div>
        <div class="stat-val" style="font-size:56px">${wpm}</div>
        <div style="font-size:13px;color:var(--brass);opacity:0.5;letter-spacing:3px;text-transform:uppercase;margin:4px 0 20px">Wörter pro Minute</div>
        <div style="display:flex;justify-content:center;gap:32px">
          <div class="stat"><div style="font-size:24px;color:var(--brass-light);font-family:'Playfair Display',serif;font-weight:700">${acc}%</div><div class="stat-lbl">Genauigkeit</div></div>
          <div class="stat"><div style="font-size:24px;color:var(--brass-light);font-family:'Playfair Display',serif;font-weight:700">${pos}</div><div class="stat-lbl">Zeichen</div></div>
          <div class="stat"><div style="font-size:24px;color:var(--brass-light);font-family:'Playfair Display',serif;font-weight:700">${Math.round(elapsed)}s</div><div class="stat-lbl">Zeit</div></div>
        </div>
        <button class="btn btn-primary" onclick="init()" style="margin-top:24px;padding:12px 32px;font-size:15px">Nochmal</button>
      </div>`;
    return;
  }

  app.innerHTML = `
    <header style="text-align:center;margin-bottom:28px">
      <div style="font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--brass);opacity:0.5;margin-bottom:12px;animation:titleReveal .8s ease both">⌨️  Minispiel</div>
      <h1 class="serif" style="font-size:44px;font-weight:800;color:var(--brass-light);animation:slideUp .6s ease both">Typing Test</h1>
      <div class="divider" style="margin:18px auto 0"></div>
      <div style="margin-top:10px"><a href="spiele.html" class="btn btn-ghost" style="font-size:12px;padding:6px 14px;text-decoration:none">← Alle Spiele</a></div>
    </header>

    <div class="time-btns">
      ${[15,30,60].map(t => `<button class="time-btn ${t===duration?'active':''}" onclick="init(${t})">${t}s</button>`).join('')}
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="wpm">0</div><div class="stat-lbl">WPM</div></div>
      <div class="stat"><div class="stat-val" id="time-left">${duration}</div><div class="stat-lbl">Sekunden</div></div>
      <div class="stat"><div class="stat-val" id="acc">100%</div><div class="stat-lbl">Genauigkeit</div></div>
    </div>

    <div class="text-display" id="text-display" tabindex="0" onclick="focusDisplay()">
      <div id="text-chars">${buildCharsHTML()}</div>
      <div class="click-hint" id="click-hint">Klicke hier und fang an zu tippen...</div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  `;

  // Attach keyboard listener to the display div
  const display = document.getElementById('text-display');
  display.addEventListener('keydown', handleKey);
  display.focus();
}

init(30);
</script>
</body>
</html>
